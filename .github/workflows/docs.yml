name: Docs

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  docs-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Public docs gate
        run: python tools/owledge.py test public-docs --project-root .

      - name: Benchmark harness smoke
        run: python tools/owledge.py benchmark --project-root .
