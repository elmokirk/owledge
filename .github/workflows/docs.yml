name: Docs

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  docs-integrity:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Public docs gate
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tools\test-public-docs.ps1 -ProjectRoot .

      - name: Benchmark harness smoke
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\benchmarks\run-benchmarks.ps1 -ProjectRoot .
