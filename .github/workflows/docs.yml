name: Docs

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  docs-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Public docs gate
        run: python tools/owledge.py test public-docs --project-root .

      - name: Release trust gate
        run: python tools/owledge.py test release-trust --project-root .

      - name: Version contract
        run: python tools/owledge.py test version-contract --project-root .

      - name: Documentation contract
        run: python tools/owledge.py test docs-contract --project-root . --base-ref origin/\${{ github.base_ref || 'main' }}

      - name: Release contract
        run: python tools/owledge.py test release-contract --project-root .

      - name: Wikilink audit
        run: python tools/owledge.py wikilink-audit --project-root . --check

      - name: Benchmark kit docs smoke
        run: python tools/owledge.py test benchmark-kit-ci --project-root .

      - name: Read-only MCP smoke
        run: python tools/owledge.py test mcp-readonly --project-root .
