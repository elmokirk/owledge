name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build-dist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --quiet --upgrade build twine uv

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Wheel uvx smoke
        run: |
          VERSION=$(cat VERSION)
          WHEEL="dist/owledge-${VERSION}-py3-none-any.whl"
          uvx --from "$WHEEL" owledge --help
          tmp=$(mktemp -d /tmp/owledge-wheel-XXXXXX)
          uvx --from "$WHEEL" owledge quickstart --target "$tmp"
          test -f "$tmp/OWLEDGE.md"
          test -d "$tmp/.owledge"

      - name: Publish readiness
        run: python tools/owledge.py test publish-readiness --project-root .

      - name: Verify sdist is clean
        run: |
          python -m pip install --quiet .
          python tools/owledge_core.py --project-root . sdist-clean

      - name: Verify upgrade notes on schema/template changes
        run: |
          # Check if product templates or schemas changed between the prior tag and HEAD
          BASE=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || echo HEAD~1)
          if git diff --name-only $BASE HEAD -- templates/ schemas/ OWLEDGE.template.md AGENTS.template.md CLAUDE.template.md | grep -q .; then
            if ! grep -q "## Upgrade notes" CHANGELOG.md; then
              echo "ERROR: templates/ or schemas/ changed but CHANGELOG.md has no '## Upgrade notes' section"
              exit 1
            fi
            echo "OK: Upgrade notes present in CHANGELOG.md"
          else
            echo "OK: No template/schema changes since $BASE"
          fi

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish-pypi
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
