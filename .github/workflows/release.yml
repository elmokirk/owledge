name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build-dist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --quiet --upgrade build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Verify sdist is clean
        run: |
          python -m pip install --quiet .
          python tools/agent_memory_cli.py --project-root . sdist-clean

      - name: Verify upgrade notes on schema/template changes
        run: |
          # Check if templates/ or schemas/ changed in this tag
          if git diff --name-only HEAD~1 HEAD -- templates/ schemas/ | grep -q .; then
            if ! grep -q "## Upgrade notes" CHANGELOG.md; then
              echo "ERROR: templates/ or schemas/ changed but CHANGELOG.md has no '## Upgrade notes' section"
              exit 1
            fi
            echo "OK: Upgrade notes present in CHANGELOG.md"
          else
            echo "OK: No template/schema changes in this tag"
          fi

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish-pypi
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true