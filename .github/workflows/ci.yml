name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  core-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python compile
        run: python -m py_compile tools/owledge.py tools/agent_memory_cli.py tools/build_kb_module.py tools/build_project_folder_kit.py benchmarks/run_benchmarks.py

      - name: Public docs
        run: python tools/owledge.py test public-docs --project-root .

      - name: Principles skill
        run: python tools/owledge.py test principles-skill --project-root .

      - name: Contracts
        run: python tools/owledge.py test contracts --project-root .

      - name: KB module
        run: python tools/owledge.py test kb-module --project-root .

      - name: Runtime adapters
        run: python tools/owledge.py test runtime-adapters --project-root .

      - name: Platform-neutral core
        run: python tools/owledge.py test core-platform-neutral --project-root .
