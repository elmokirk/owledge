name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  core-matrix:
    name: core-${{ matrix.os }}-py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Python compile
        run: python -m py_compile tools/owledge.py tools/agent_memory_cli.py tools/build_kb_module.py tools/build_project_folder_kit.py benchmarks/run_benchmarks.py plugins/agent-memory-cowork/scripts/capture-claude-event.py plugins/agent-memory-cowork/scripts/close-runtime-session.py

      - name: Public docs
        run: python tools/owledge.py test public-docs --project-root .

      - name: Release trust
        run: python tools/owledge.py test release-trust --project-root .

      - name: Platform-neutral core
        run: python tools/owledge.py test core-platform-neutral --project-root .

      - name: KB module
        run: python tools/owledge.py test kb-module --project-root .

      - name: Runtime adapters
        run: python tools/owledge.py test runtime-adapters --project-root .

  release-gates:
    name: full-release-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: python -m pip install --quiet pytest

      - name: Stress tests (v0.6.1 fix-up suite)
        run: python -m pytest tests/unit/ -q --tb=short

      - name: Finalization gates (dogfood)
        run: python tools/owledge.py finalization-gates --project-root . --include-compliance --include-exports

      - name: Build clean kit
        run: python tools/owledge.py build-project-kit --output-path /tmp/clean-kit --force --verify

      - name: Kit integrity (zero dogfood)
        run: python tools/agent_memory_cli.py --project-root /tmp/clean-kit kit-integrity

      - name: Addon boundary check
        run: python tools/agent_memory_cli.py --project-root /tmp/clean-kit addon-boundary-check

      - name: Source vs target audit
        run: python tools/agent_memory_cli.py --project-root . source-vs-target-audit

      - name: Sdist clean
        run: |
          python -m pip install --quiet build
          python -m build --sdist
          python tools/agent_memory_cli.py --project-root . sdist-clean

  fresh-install-cycle:
    name: fresh-install-cycle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install owledge from source
        run: python -m pip install --quiet -e .

      - name: Fresh init-project + doctor + upgrade --dry-run
        run: |
          tmp=$(mktemp -d /tmp/owledge-fresh-XXXXXX)
          owledge init-project --target "$tmp"
          owledge doctor --project-root "$tmp" --mode host
          owledge upgrade --project-root "$tmp" --dry-run
          echo "Fresh install cycle completed successfully"
